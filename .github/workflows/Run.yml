name: Generate and Push Prisma Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install prisma

      - name: Generate Prisma Client
        # Adjust the --schema path if your schema is located elsewhere
        run: python -m prisma generate --output=./generated/prisma

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate prisma client for LiteLLM"
          file_pattern: 'generated/prisma/*'
