name: Build Prisma and Push Repo

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prisma
        run: |
          npm install prisma @prisma/client

      - name: Run Prisma Generate
        run: |
          npx prisma generate

      - name: Push to new repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git remote add target https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/burhanbadnagarwala-commits/litellm-built.git

          git add .
          git commit -m "Build with Prisma client" || echo "Nothing to commit"

          git push target HEAD:main --force
