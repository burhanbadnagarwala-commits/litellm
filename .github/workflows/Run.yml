name: Build Prisma and Push

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install prisma-client-py
        run: |
          pip install prisma-client-py

      - name: Install prisma CLI
        run: |
          npm install -g prisma

      - name: Generate Prisma client
        run: |
          prisma generate

      - name: Push built repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git remote add target https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/burhanbadnagarwala-commits/litellm-built.git

          git add .
          git commit -m "Generated prisma client" || echo "No changes"
          git push target HEAD:main --force
