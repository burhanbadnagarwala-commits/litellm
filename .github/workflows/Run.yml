name: Generate and Push Prisma Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install prisma litellm
          # Ensure the target folder exists in your repo
          mkdir -p generated/prisma

      - name: Generate Prisma Client
        run: |
          # Generate to default site-packages first
          python -m prisma generate --schema=./prisma/schema.prisma
          
          # FIND where it was generated and COPY it to your repo folder
          # This command finds the 'prisma' package folder and copies its contents
          PRISMA_PATH=$(python -c "import prisma; import os; print(os.path.dirname(prisma.__file__))")
          cp -r $PRISMA_PATH/* ./generated/prisma/

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: manual copy of prisma client"
          file_pattern: 'generated/prisma/**'
