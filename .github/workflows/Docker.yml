name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Clone Hugging Face Space
        run: |
          git clone https://huggingface.co/spaces/Burhanuddin-infinity/Infinity-Ai-Backend hf-space

      - name: Copy Files
        run: |
          rsync -av --exclude hf-space --exclude .git . hf-space/

      - name: Commit and Push
        run: |
          cd hf-space
          git config user.email "github-action@users.noreply.github.com"
          git config user.name "github-actions"

          git add .
          git commit -m "Auto deploy from GitHub" || echo "No changes"

          git push https://Burhanuddin-infinity:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Burhanuddin-infinity/Infinity-Ai-Backend main
